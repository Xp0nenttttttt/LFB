
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --main:#A3C9A8;
  --accent:#FFD6E0;
  --accent2:#B5D8F6;
  --text:#444;
  --text-light:#888;
  --bg:#babaff;
  --bg2:#b9acff;
  --border:#afafff;
  --shadow:0 2px 8px rgba(163,201,168,0.10);
  --error:#FF8A80;
  --success:#A3C9A8;
  /* Couleurs rôles pastel */
  --admin:#B39DDB;
  --host:#FFD54F;
  --player:#81D4FA;
  --verifier:#AED581;
  /* Couleurs statuts vidéos pastel */
  --pending:#FFF59D;
  --approved:#A5D6A7;
  --rejected:#FFAB91;
}
body{
  font-family:'Quicksand',sans-serif;
  color:var(--text);
  font-size:16px;
  background:var(--bg);
}
.app{
  background:var(--bg2);
  border-radius:18px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  overflow:hidden;
  min-height:500px;
}
.hdr{
  background:var(--bg2);
  border-bottom:2px solid var(--main);
  padding:18px 24px;
  display:flex;
  align-items:center;
  gap:14px;
}
.logo{
  font-family:'Quicksand',sans-serif;
  font-size:14px;
  font-weight:700;
  color:var(--main);
  letter-spacing:1px;
}
.lvl-name{
  font-family:'Quicksand',sans-serif;
  font-size:20px;
  font-weight:700;
  color:var(--accent2);
  flex:1;
}
.lvl-name input{
  background:transparent;
  border:none;
  border-bottom:2px solid var(--accent2);
  color:var(--accent2);
  font-family:'Quicksand',sans-serif;
  font-size:20px;
  font-weight:700;
  outline:none;
  width:100%;
}
.nav{
  display:flex;
  gap:8px;
}
.ntab{
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text-light);
  padding:7px 18px;
  border-radius:8px;
  font-family:'Quicksand',sans-serif;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
}
.ntab.active,.ntab:hover{
  border-color:var(--main);
  color:var(--main);
  background:var(--accent);
}
.bar{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:12px 24px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  min-height:48px;
}
.btn{
  background:var(--main);
  border:none;
  color:#fff;
  padding:8px 20px;
  border-radius:8px;
  font-family:'Quicksand',sans-serif;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:background .15s,box-shadow .15s;
  box-shadow:0 1px 4px rgba(163,201,168,0.10);
  letter-spacing:.2px;
}
.btn:hover{background:var(--accent2);color:var(--text)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.sm{padding:5px 14px;font-size:13px}
.ubadge{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-light)}
.ubadge strong{color:var(--accent2)}
.rbadge{
  font-size:12px;
  padding:3px 10px;
  border-radius:20px;
  font-weight:600;
  letter-spacing:.3px;
  background:var(--accent2);
  color:var(--text);
  border:1.5px solid var(--main);
}
.rbadge-admin{
  background:var(--admin);
  border-color:var(--admin);
  color:#fff;
}
.rbadge-host{
  background:var(--host);
  border-color:var(--host);
  color:#7B5E00;
}
.rbadge-player{
  background:var(--player);
  border-color:var(--player);
  color:#006978;
}
.rbadge-verifier{
  background:var(--verifier);
  border-color:var(--verifier);
  color:#33691E;
}

/* Statuts vidéo */
.vstatus-pending{
  background:var(--pending);
  border-color:var(--pending);
  color:#B59F00;
}
.vstatus-approved{
  background:var(--approved);
  border-color:var(--approved);
  color:#1B5E20;
}
.vstatus-rejected{
  background:var(--rejected);
  border-color:var(--rejected);
  color:#BF360C;
}
.body{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.card{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  transition:border-color .15s,box-shadow .15s;
  box-shadow:0 1px 6px rgba(181,216,246,0.08);
}
.card:hover{border-color:var(--main);box-shadow:0 2px 12px rgba(181,216,246,0.13);}
.card.cdone{border-left:4px solid var(--success)}
.card.cclaim{border-left:4px solid var(--accent2)}
.card.copen{border-left:4px solid var(--border)}
.card-h{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none}
.pnum{font-family:'Quicksand',sans-serif;font-size:15px;font-weight:700;color:var(--main);min-width:26px}
.prange{font-size:15px;color:var(--text-light);min-width:90px;font-weight:500}
.pplayer{flex:1;font-size:16px;font-weight:600}
.pplayer.empty{color:var(--text-light);font-style:italic;font-weight:400}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--accent2)}
.chev{font-size:13px;color:var(--text-light);transition:transform .2s;margin-left:4px}
.chev.op{transform:rotate(180deg)}
.card-b{padding:0 18px 14px;border-top:1px solid var(--border)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:12px}
.vlink{color:var(--accent2);font-size:14px;text-decoration:none;word-break:break-all}
.vlink:hover{text-decoration:underline}
.note-txt{font-size:13px;color:var(--text-light);margin-top:8px}
.vstatus{font-size:13px;padding:4px 12px;border-radius:12px;font-weight:600;border:1.5px solid var(--main);background:var(--accent);color:var(--text)}
.empty{text-align:center;padding:40px;color:var(--text-light);font-size:15px}
.foot{display:flex;gap:22px;padding:14px 24px;border-top:1px solid var(--border);background:var(--bg2)}
.stat .sv{font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700}
.stat .sl{font-size:12px;color:var(--text-light);letter-spacing:.4px;margin-top:2px}
.pbar{height:7px;background:var(--accent2);border-radius:4px;overflow:hidden;margin:10px 24px 0}
.pfill{height:100%;background:var(--main);border-radius:4px;transition:width .4s}
.mod-bg{position:fixed;inset:0;background:rgba(163,201,168,.13);display:flex;align-items:center;justify-content:center;z-index:999}
.mod{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:380px;max-width:94vw;max-height:90vh;overflow-y:auto}
.mod h3{font-family:'Quicksand',sans-serif;font-size:14px;color:var(--main);margin-bottom:16px;letter-spacing:1px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:12px;color:var(--text-light);letter-spacing:.5px}
.field input,.field select{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:9px 12px;
  color:var(--text);
  font-family:'Quicksand',sans-serif;
  font-size:15px;
  outline:none;
  width:100%;
}
.field input:focus,.field select:focus{border-color:var(--main)}
.field select option{background:var(--bg2)}
.mbtns{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.err{color:var(--error);font-size:13px;margin-top:8px;padding:10px 12px;background:rgba(255,138,128,.10);border-radius:8px;border:1px solid rgba(255,138,128,.18)}
.setup-wrap{padding:30px 20px;display:flex;flex-direction:column;align-items:center;gap:14px}
.setup-wrap h2{font-family:'Orbitron',monospace;font-size:14px;color:var(--yl);letter-spacing:1px;text-align:center}
.setup-form{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--mu);padding:8px 16px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:-1px}
.tab.active{color:var(--or);border-bottom-color:var(--or)}
.admin-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--bd);font-size:14px;flex-wrap:wrap}
.admin-row:last-child{border-bottom:none}
.admin-row .name{flex:1;font-weight:600;min-width:80px}
.hint{font-size:12px;color:var(--mu);margin-top:6px;line-height:1.5;padding:8px 10px;background:rgba(0,180,255,.06);border-radius:6px;border:1px solid rgba(0,180,255,.15)}
.sep{height:1px;background:var(--bd);margin:4px 0}
.assign-inline{display:flex;gap:6px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);flex-wrap:wrap}
.assign-inline label{font-size:11px;color:var(--mu);letter-spacing:.4px;white-space:nowrap}
.assign-inline select{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;padding:5px 8px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:13px;outline:none;flex:1;min-width:100px}
.assign-inline select:focus{border-color:var(--yl)}
.assign-inline select option{background:var(--bg2)}
</style>

<div class="app" id="root"><div class="body"><div class="empty">Chargement...</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient}=supabase;
const SB_URL='https://xbnhwbcvtflygqjghlav.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhibmh3YmN2dGZseWdxamdobGF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MDQ3NjksImV4cCI6MjA5MTQ4MDc2OX0.ckJa8Mc3nHHZPYvJjwwAIIi2g-jIdTxZCC0yLssthEA';
let sb=createClient(SB_URL,SB_KEY);
let S={view:'auth',authTab:'login',appTab:'parts',user:null,profile:null,level:null,parts:[],videos:[],profiles:[],expanded:{},modal:null,editTitle:false,error:''};

async function init(){
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session){S.view='auth';render();return;}
    S.user=session.user;
    await loadProfile();
    if(!S.profile){S.view='auth';S.error='Profil introuvable, réinscris-toi.';await sb.auth.signOut();render();return;}
    await loadData();S.view='app';render();
  }catch(e){S.error=e.message;S.view='auth';render();}
}

async function loadProfile(){
  const {data}=await sb.from('profiles').select('*').eq('id',S.user.id).single();
  S.profile=data;
}
async function loadData(){
  const [{data:lv},{data:pts},{data:vids},{data:profs}]=await Promise.all([
    sb.from('levels').select('*').single(),
    sb.from('parts').select('*,profiles(id,username,role)').order('from_pct'),
    sb.from('videos').select('*,profiles(username)').order('created_at'),
    sb.from('profiles').select('*').order('username'),
  ]);
  S.level=lv;S.parts=pts||[];S.videos=vids||[];S.profiles=profs||[];
}

function isAdmin(){return S.profile&&['admin','host'].includes(S.profile.role);}
function videoFor(pid){return S.videos.find(v=>v.part_id===pid);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function roleBadgeStyle(r){const c={admin:'var(--pu)',host:'var(--yl)',player:'var(--bl)',verifier:'var(--gr)'}[r]||'var(--mu)';return `border-color:${c};color:${c}`;}
function roleLabel(r){return {admin:'Admin',host:'Host',player:'Joueur',verifier:'Vérif.'}[r]||r||'';}
function vidStatusStyle(s){const c={pending:'var(--yl)',approved:'var(--gr)',rejected:'var(--rd)'}[s]||'var(--mu)';return `border-color:${c};color:${c}`;}
function vidStatusLabel(s){return {pending:'En attente',approved:'Validée',rejected:'Rejetée'}[s]||s;}

function render(){document.getElementById('root').innerHTML=buildHTML();attach();}

function buildHTML(){
  if(S.view==='auth')return buildAuth();
  return buildApp();
}

function buildSetup(){
  return `<div class="setup-wrap">
    <h2>CONFIGURATION SUPABASE</h2>
    <p style="font-size:13px;color:var(--mu);text-align:center;max-width:300px;line-height:1.6">Entre les identifiants de ton projet Supabase (Settings → API).</p>
    <div class="setup-form">
      <div class="field"><label>URL DU PROJET</label><input id="sb-url" placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label>ANON / PUBLIC KEY</label><input id="sb-key" placeholder="eyJhb..."></div>
      ${S.error?`<div class="err">${esc(S.error)}</div>`:''}
      <button class="btn gr" id="sb-connect">Connecter</button>
    </div>
  </div>`;
}

function buildAuth(){
  const t=S.authTab;
  return `<div style="padding:30px 20px;display:flex;flex-direction:column;align-items:center">
    <div style="font-family:'Orbitron',monospace;font-size:14px;color:var(--yl);margin-bottom:20px;letter-spacing:1px">GD COLLAB</div>
    <div style="width:100%;max-width:340px">
      <div class="tabs">
        <button class="tab ${t==='login'?'active':''}" data-authtab="login">Connexion</button>
        <button class="tab ${t==='signup'?'active':''}" data-authtab="signup">Inscription</button>
      </div>
      <div class="field"><label>EMAIL</label><input id="a-email" type="email" placeholder="toi@exemple.com"></div>
      <div class="field"><label>MOT DE PASSE</label><input id="a-pwd" type="password" placeholder="••••••••"></div>
      ${t==='signup'?`<div class="field"><label>PSEUDO</label><input id="a-uname" placeholder="NovemberX"></div>`:''}
      ${S.error?`<div class="err">${esc(S.error)}</div>`:''}
      <button class="btn gr" id="a-submit" style="width:100%;margin-top:8px">${t==='login'?'Se connecter':'Créer un compte'}</button>

    </div>
  </div>`;
}

function buildApp(){
  const {level,parts,appTab,profile,editTitle}=S;
  const done=parts.filter(p=>videoFor(p.id)?.status==='approved').length;
  const pct=parts.length?Math.round(done/parts.length*100):0;
  return `
  ${S.modal?buildModal():''}
  <div class="hdr">
    <span class="logo">GD COLLAB</span>
    ${editTitle&&isAdmin()
      ?`<input class="lvl-name" id="title-inp" value="${esc(level?.name||'')}" style="flex:1">`
      :`<div class="lvl-name" id="edit-title" style="${isAdmin()?'cursor:pointer':''}">${esc(level?.name||'Collab GD')}</div>`}
    ${editTitle&&isAdmin()?`<button class="btn sm gr" id="save-title">OK</button>`:''}
    <div class="nav">
      <button class="ntab ${appTab==='parts'?'active':''}" data-tab="parts">Parties</button>
      ${isAdmin()?`<button class="ntab ${appTab==='admin'?'active':''}" data-tab="admin">Admin</button>`:''}
      <button class="ntab ${appTab==='info'?'active':''}" data-tab="info">ℹ Règles</button>
    </div>
  </div>
  <div class="bar">
    ${isAdmin()?`<button class="btn sm gr" id="add-part">+ Partie</button>`:''}
    <div class="ubadge">
      <span>Connecté :</span><strong>${esc(profile?.username||'')}</strong>
      <span class="rbadge" style="${roleBadgeStyle(profile?.role)}">${roleLabel(profile?.role)}</span>
      <button class="btn sm rd" id="logout">Déco</button>
    </div>
  </div>
  ${appTab==='parts'?buildParts():appTab==='admin'?buildAdmin():buildInfo()}
  <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  <div class="foot">
    <div class="stat"><div class="sv" style="color:var(--or)">${parts.length}</div><div class="sl">PARTIES</div></div>
    <div class="stat"><div class="sv" style="color:var(--yl)">${parts.filter(p=>p.player_id).length}</div><div class="sl">PRISES</div></div>
    <div class="stat"><div class="sv" style="color:var(--pu)">${S.videos.filter(v=>v.status==='pending').length}</div><div class="sl">EN ATTENTE</div></div>
    <div class="stat"><div class="sv" style="color:var(--gr)">${done}</div><div class="sl">VALIDÉES</div></div>
    <div class="stat"><div class="sv" style="color:var(--mu)">${pct}%</div><div class="sl">COMPLET</div></div>
  </div>`;
}

function buildParts(){
  const {parts}=S;
  if(!parts.length)return `<div class="body"><div class="empty">Aucune partie.<br>${isAdmin()?'Crée des parties pour démarrer !':'En attente de l\'admin.'}</div></div>`;
  return `<div class="body">${parts.map((p,i)=>buildPart(p,i)).join('')}</div>`;
}

function playerOptions(selectedId){
  const none=`<option value="" ${!selectedId?'selected':''}>— Personne —</option>`;
  const opts=S.profiles.map(pr=>`<option value="${pr.id}" ${selectedId===pr.id?'selected':''}>${esc(pr.username)} (${roleLabel(pr.role)})</option>`).join('');
  return none+opts;
}

function buildPart(p,i){
  const vid=videoFor(p.id);
  const open=S.expanded[p.id];
  const statusClass=vid?.status==='approved'?'cdone':(p.player_id?'cclaim':'copen');
  const dotColor=vid?.status==='approved'?'var(--gr)':(p.player_id?'var(--yl)':'#444');
  const player=p.profiles;
  const isMyPart=S.profile&&p.player_id===S.profile.id;
  const canClaim=S.profile&&!p.player_id;
  return `<div class="card ${statusClass}">
    <div class="card-h" data-part="${p.id}">
      <span class="pnum">#${i+1}</span>
      <span class="prange">${p.from_pct}% → ${p.to_pct}%</span>
      <span class="pplayer ${player?'':'empty'}">${player?esc(player.username):'Libre'}</span>
      ${player?`<span class="rbadge" style="${roleBadgeStyle(player.role)}">${roleLabel(player.role)}</span>`:''}
      ${vid?`<span class="vstatus" style="${vidStatusStyle(vid.status)}">${vidStatusLabel(vid.status)}</span>`:''}
      <div class="dot" style="background:${dotColor};margin-left:auto"></div>
      <span class="chev ${open?'op':''}">▼</span>
    </div>
    ${open?`<div class="card-b">
      ${p.note?`<div class="note-txt">📝 ${esc(p.note)}</div>`:''}
      ${vid?`<div class="row"><span style="font-size:12px;color:var(--mu)">Vidéo :</span><a class="vlink" href="${esc(vid.url)}" target="_blank">${esc(vid.url)}</a></div>`:''}
      ${vid?.hardest?`<div class="note-txt" style="color:var(--rd)">💀 Hardest : ${esc(vid.hardest)}</div>`:''}
      ${isAdmin()?`<div class="assign-inline">
        <label>ASSIGNÉ À</label>
        <select data-assign-select="${p.id}">${playerOptions(p.player_id)}</select>
        <button class="btn sm yl" data-assign-save="${p.id}">Assigner</button>
      </div>`:''}

      <div class="row">
        ${!isAdmin()&&canClaim?`<button class="btn sm gr" data-claim="${p.id}">Revendiquer</button>`:''}
        ${isMyPart&&!vid?`<button class="btn sm bl" data-submit-video="${p.id}">Soumettre vidéo</button>`:''}
        ${isMyPart&&vid&&vid.status!=='approved'?`<button class="btn sm bl" data-submit-video="${p.id}">Modifier vidéo</button>`:''}
        ${isAdmin()&&vid?.status==='pending'?`<button class="btn sm gr" data-approve="${vid.id}">Valider</button><button class="btn sm rd" data-reject="${vid.id}">Rejeter</button>`:''}
        ${isAdmin()?`<button class="btn sm" data-edit-part="${p.id}" style="border-color:var(--mu);color:var(--mu)">Modifier</button><button class="btn sm rd" data-del-part="${p.id}">Suppr.</button>`:''}
      </div>
    </div>`:''}
  </div>`;
}

function buildInfo(){
  return `<div class="body">
    <div class="card" style="border-left:3px solid var(--or)">
      <div style="padding:14px 16px;border-bottom:1px solid var(--bd);font-family:'Orbitron',monospace;font-size:11px;color:var(--or);letter-spacing:.5px">🎮 C'EST QUOI UNE COLLAB GD ?</div>
      <div style="padding:14px 16px;font-size:14px;line-height:1.8;color:var(--tx)">
        Une <strong style="color:var(--yl)">collab Geometry Dash</strong> est un niveau créé à plusieurs mains. Chaque joueur crée et joue une <em>partie</em> du niveau (définie par un pourcentage de début et de fin). Le niveau final est ensuite assemblé par le host et soumis sur GD.
      </div>
    </div>

    <div class="card" style="border-left:3px solid var(--bl)">
      <div style="padding:14px 16px;border-bottom:1px solid var(--bd);font-family:'Orbitron',monospace;font-size:11px;color:var(--bl);letter-spacing:.5px">📋 COMMENT ÇA FONCTIONNE ICI ?</div>
      <div style="padding:14px 16px;display:flex;flex-direction:column;gap:12px;font-size:14px;line-height:1.7">
        <div style="display:flex;gap:10px;align-items:flex-start">
          <span style="font-family:'Orbitron',monospace;font-size:16px;color:var(--or);min-width:28px">1.</span>
          <div><strong style="color:var(--yl)">Revendique une partie</strong><br><span style="color:var(--mu)">Dans l'onglet Parties, ouvre une carte libre (indiquée "Libre") et clique sur <em>Revendiquer</em>. La partie t'est assignée.</span></div>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-start">
          <span style="font-family:'Orbitron',monospace;font-size:16px;color:var(--or);min-width:28px">2.</span>
          <div><strong style="color:var(--yl)">Crée ta partie dans GD</strong><br><span style="color:var(--mu)">Utilise l'éditeur GD pour construire et décorer ta portion du niveau selon les consignes données par le host (style, difficulté, etc.).</span></div>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-start">
          <span style="font-family:'Orbitron',monospace;font-size:16px;color:var(--or);min-width:28px">3.</span>
          <div><strong style="color:var(--yl)">Enregistre ta vidéo</strong><br><span style="color:var(--mu)">Fais une vidéo en complétant ta partie dans GD (run propre, pas de crash). Upload-la sur YouTube ou tout autre hébergeur.</span></div>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-start">
          <span style="font-family:'Orbitron',monospace;font-size:16px;color:var(--or);min-width:28px">4.</span>
          <div><strong style="color:var(--yl)">Soumets ta vidéo</strong><br><span style="color:var(--mu)">Clique sur <em>Soumettre vidéo</em> sur ta carte et colle le lien. Indique aussi ton <em>hardest</em> (le moment le plus difficile de ta partie). La vidéo passe ensuite en validation.</span></div>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-start">
          <span style="font-family:'Orbitron',monospace;font-size:16px;color:var(--or);min-width:28px">5.</span>
          <div><strong style="color:var(--yl)">Validation par un admin</strong><br><span style="color:var(--mu)">Un admin ou vérifieur regarde ta vidéo. Si elle est conforme, elle est <em style="color:var(--gr)">validée ✓</em>. Sinon, elle est <em style="color:var(--rd)">rejetée ✗</em> avec possibilité de re-soumettre.</span></div>
        </div>
      </div>
    </div>

    <div class="card" style="border-left:3px solid var(--yl)">
      <div style="padding:14px 16px;border-bottom:1px solid var(--bd);font-family:'Orbitron',monospace;font-size:11px;color:var(--yl);letter-spacing:.5px">⚠️ RÈGLES À RESPECTER</div>
      <div style="padding:14px 16px;display:flex;flex-direction:column;gap:8px;font-size:14px">
        ${[
          ['var(--gr)','Ta vidéo doit être un run <strong>sans crash</strong> sur toute ta partie.'],
          ['var(--gr)','Le style visuel doit <strong>correspondre au thème</strong> de la collab défini par le host.'],
          ['var(--gr)','Ton lien vidéo doit être <strong>public et accessible</strong> (pas de lien privé).'],
          ['var(--rd)','Ne <strong>revendique pas une partie</strong> si tu ne peux pas la finir dans les délais.'],
          ['var(--rd)','Pas de <strong>contenu offensant</strong> ou inapproprié dans ta partie.'],
          ['var(--rd)','Ne soumet pas une vidéo si ta partie n\'est <strong>pas terminée et décorée</strong>.'],
        ].map(([c,t])=>`<div style="display:flex;gap:8px;align-items:flex-start"><span style="color:${c};font-size:16px;line-height:1.2">◆</span><span style="color:var(--tx);line-height:1.6">${t}</span></div>`).join('')}
      </div>
    </div>

    <div class="card" style="border-left:3px solid var(--pu)">
      <div style="padding:14px 16px;border-bottom:1px solid var(--bd);font-family:'Orbitron',monospace;font-size:11px;color:var(--pu);letter-spacing:.5px">🏷️ LES RÔLES</div>
      <div style="padding:14px 16px;display:flex;flex-direction:column;gap:10px;font-size:14px">
        ${[
          ['admin','Admin','Gère tout : parties, membres, vidéos, titre du niveau.'],
          ['host','Host','Organise la collab, assigne les parties et valide les vidéos.'],
          ['verifier','Vérif.','Peut regarder et valider/rejeter les vidéos soumises.'],
          ['player','Joueur','Revendique une partie, soumet et modifie sa vidéo.'],
        ].map(([r,label,desc])=>`<div style="display:flex;gap:10px;align-items:flex-start">
          <span class="rbadge" style="${roleBadgeStyle(r)};flex-shrink:0">${label}</span>
          <span style="color:var(--mu);line-height:1.5">${desc}</span>
        </div>`).join('')}
      </div>
    </div>

    <div class="card" style="border-left:3px solid var(--mu)">
      <div style="padding:14px 16px;border-bottom:1px solid var(--bd);font-family:'Orbitron',monospace;font-size:11px;color:var(--mu);letter-spacing:.5px">💡 STATUTS DES VIDÉOS</div>
      <div style="padding:14px 16px;display:flex;flex-direction:column;gap:8px;font-size:14px">
        <div style="display:flex;gap:10px;align-items:center"><span class="vstatus" style="${vidStatusStyle('pending')}">${vidStatusLabel('pending')}</span><span style="color:var(--mu)">La vidéo a été soumise et attend d'être examinée.</span></div>
        <div style="display:flex;gap:10px;align-items:center"><span class="vstatus" style="${vidStatusStyle('approved')}">${vidStatusLabel('approved')}</span><span style="color:var(--mu)">La vidéo est conforme, la partie est terminée !</span></div>
        <div style="display:flex;gap:10px;align-items:center"><span class="vstatus" style="${vidStatusStyle('rejected')}">${vidStatusLabel('rejected')}</span><span style="color:var(--mu)">La vidéo a été refusée, tu peux en soumettre une nouvelle.</span></div>
      </div>
    </div>
  </div>`;
}

function buildAdmin(){
  return `<div class="body">
    <div class="card">
      <div style="padding:12px 14px;border-bottom:1px solid var(--bd);font-family:'Orbitron',monospace;font-size:11px;color:var(--yl);letter-spacing:.5px">GESTION DES MEMBRES</div>
      ${S.profiles.length===0
        ?`<div class="empty" style="padding:20px">Aucun membre</div>`
        :S.profiles.map(pr=>`<div class="admin-row">
          <span class="name">${esc(pr.username)}</span>
          <span class="rbadge" style="${roleBadgeStyle(pr.role)}">${roleLabel(pr.role)}</span>
          <select data-role-uid="${pr.id}" style="background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:4px 8px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:13px">
            ${['admin','host','player','verifier'].map(r=>`<option value="${r}" ${pr.role===r?'selected':''}>${roleLabel(r)}</option>`).join('')}
          </select>
          <button class="btn sm pu" data-save-role="${pr.id}">Sauver</button>
        </div>`).join('')}
    </div>

    <div class="card">
      <div style="padding:12px 14px;border-bottom:1px solid var(--bd);font-family:'Orbitron',monospace;font-size:11px;color:var(--yl);letter-spacing:.5px">ASSIGNATION RAPIDE DES PARTIES</div>
      ${S.parts.length===0
        ?`<div class="empty" style="padding:20px">Aucune partie créée</div>`
        :S.parts.map((p,i)=>{
          const player=p.profiles;
          const vid=videoFor(p.id);
          return `<div class="admin-row">
            <span class="name" style="min-width:90px">#${i+1} — ${p.from_pct}%→${p.to_pct}%</span>
            <select data-assign-select="${p.id}" style="background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:4px 8px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:13px;flex:1">
              ${playerOptions(p.player_id)}
            </select>
            <button class="btn sm yl" data-assign-save="${p.id}">Assigner</button>
            ${vid?`<span class="vstatus" style="${vidStatusStyle(vid.status)}">${vidStatusLabel(vid.status)}</span>`:''}
          </div>`;
        }).join('')}
    </div>

    <div class="card">
      <div style="padding:12px 14px;border-bottom:1px solid var(--bd);font-family:'Orbitron',monospace;font-size:11px;color:var(--yl);letter-spacing:.5px">VIDÉOS EN ATTENTE</div>
      ${S.videos.filter(v=>v.status==='pending').length===0
        ?`<div class="empty" style="padding:20px">Aucune vidéo en attente</div>`
        :S.videos.filter(v=>v.status==='pending').map(v=>{
          const part=S.parts.find(p=>p.id===v.part_id);
          return `<div class="admin-row">
            <span class="name">${esc(v.profiles?.username||'')} — ${part?`${part.from_pct}%→${part.to_pct}%`:''}</span>
            <a class="vlink" href="${esc(v.url)}" target="_blank" style="font-size:12px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.url)}</a>
            ${v.hardest?`<span style="font-size:11px;color:var(--rd);white-space:nowrap">💀 ${esc(v.hardest)}</span>`:''}
            <button class="btn sm gr" data-approve="${v.id}">✓</button>
            <button class="btn sm rd" data-reject="${v.id}">✗</button>
          </div>`;}).join('')}
    </div>
  </div>`;
}

function buildModal(){
  const m=S.modal;
  if(m.type==='part')return `<div class="mod-bg" id="mod-bg">
    <div class="mod">
      <h3>${m.edit?'MODIFIER LA PARTIE':'NOUVELLE PARTIE'}</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field"><label>DE (%)</label><input id="m-from" type="number" min="0" max="100" value="${m.from||''}" placeholder="0"></div>
        <div class="field"><label>À (%)</label><input id="m-to" type="number" min="0" max="100" value="${m.to||''}" placeholder="10"></div>
      </div>
      <div class="field">
        <label>ASSIGNER À UN JOUEUR</label>
        <select id="m-player">${playerOptions(m.player_id||null)}</select>
      </div>
      <div class="field"><label>NOTE (optionnel)</label><input id="m-note" value="${esc(m.note||'')}" placeholder="Instructions..."></div>
      ${S.error?`<div class="err">${esc(S.error)}</div>`:''}
      <div class="mbtns"><button class="btn sm" id="mod-cancel">Annuler</button><button class="btn sm gr" id="mod-ok">${m.edit?'Sauvegarder':'Créer'}</button></div>
    </div></div>`;
  if(m.type==='video')return `<div class="mod-bg" id="mod-bg">
    <div class="mod">
      <h3>SOUMETTRE TA VIDÉO</h3>
      <p style="font-size:13px;color:var(--mu);margin-bottom:12px">Partie ${m.from_pct}% → ${m.to_pct}%</p>
      <div class="field"><label>LIEN VIDÉO</label><input id="m-url" value="${esc(m.url||'')}" placeholder="https://youtube.com/..."></div>
      <div class="field">
        <label>TON HARDEST 💀</label>
        <input id="m-hardest" value="${esc(m.hardest||'')}" placeholder="ex: 67% le triple spike, 82% le ship…">
        <div style="font-size:11px;color:var(--mu);margin-top:4px;line-height:1.5">Décris la partie la plus difficile de ton run (moment, %, obstacle...).</div>
      </div>
      <div class="hint">Ta vidéo sera soumise à validation par un admin.</div>
      ${S.error?`<div class="err">${esc(S.error)}</div>`:''}
      <div class="mbtns"><button class="btn sm" id="mod-cancel">Annuler</button><button class="btn sm bl" id="mod-ok">Soumettre</button></div>
    </div></div>`;
  return '';
}

function attach(){
  document.querySelectorAll('[data-authtab]').forEach(el=>el.addEventListener('click',()=>{S.authTab=el.dataset.authtab;S.error='';render();}));

  document.getElementById('a-submit')?.addEventListener('click',async()=>{
    const email=(document.getElementById('a-email').value||'').trim();
    const pwd=document.getElementById('a-pwd').value||'';
    S.error='';
    if(S.authTab==='signup'){
      const uname=(document.getElementById('a-uname').value||'').trim();
      if(!uname){S.error='Pseudo requis.';render();return;}
      const {data,error}=await sb.auth.signUp({email,password:pwd,options:{data:{username:uname}}});
      if(error){S.error=error.message;render();return;}
      S.user=data.user;
      await new Promise(r=>setTimeout(r,800));
    } else {
      const {data,error}=await sb.auth.signInWithPassword({email,password:pwd});
      if(error){S.error=error.message;render();return;}
      S.user=data.user;
    }
    await loadProfile();
    if(!S.profile){S.error='Profil non créé. Vérifie que le trigger SQL est bien installé.';render();return;}
    await loadData();S.view='app';render();
  });

  document.getElementById('logout')?.addEventListener('click',async()=>{await sb.auth.signOut();S.user=null;S.profile=null;S.view='auth';S.error='';render();});
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{S.appTab=el.dataset.tab;render();}));
  document.getElementById('edit-title')?.addEventListener('click',()=>{if(isAdmin()){S.editTitle=true;render();}});
  document.getElementById('save-title')?.addEventListener('click',async()=>{
    const v=(document.getElementById('title-inp').value||'').trim();
    if(v){await sb.from('levels').update({name:v}).eq('id',S.level.id);S.level.name=v;}
    S.editTitle=false;render();
  });
  document.getElementById('add-part')?.addEventListener('click',()=>{S.modal={type:'part'};S.error='';render();});

  // Assigner un joueur (inline dans la carte ou dans l'onglet admin)
  document.querySelectorAll('[data-assign-save]').forEach(el=>el.addEventListener('click',async()=>{
    const partId=+el.dataset.assignSave;
    const sel=document.querySelector(`[data-assign-select="${partId}"]`);
    if(!sel)return;
    const playerId=sel.value||null;
    await sb.from('parts').update({player_id:playerId}).eq('id',partId);
    // Si on libère, on supprime aussi la vidéo associée
    if(!playerId) await sb.from('videos').delete().eq('part_id',partId);
    await loadData();render();
  }));

  document.querySelectorAll('[data-part]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.closest('button,a,select'))return;
    const id=+el.dataset.part;S.expanded[id]=!S.expanded[id];render();
  }));
  document.querySelectorAll('[data-claim]').forEach(el=>el.addEventListener('click',async()=>{
    await sb.from('parts').update({player_id:S.profile.id}).eq('id',+el.dataset.claim);
    await loadData();render();
  }));
  document.querySelectorAll('[data-submit-video]').forEach(el=>el.addEventListener('click',()=>{
    const id=+el.dataset.submitVideo;
    const part=S.parts.find(p=>p.id===id);
    const existing=videoFor(id);
    S.modal={type:'video',part_id:id,from_pct:part.from_pct,to_pct:part.to_pct,url:existing?.url||'',hardest:existing?.hardest||''};S.error='';render();
  }));
  document.querySelectorAll('[data-edit-part]').forEach(el=>el.addEventListener('click',()=>{
    const p=S.parts.find(p=>p.id===+el.dataset.editPart);
    S.modal={type:'part',edit:p.id,from:p.from_pct,to:p.to_pct,note:p.note||'',player_id:p.player_id};S.error='';render();
  }));
  document.querySelectorAll('[data-del-part]').forEach(el=>el.addEventListener('click',async()=>{
    await sb.from('parts').delete().eq('id',+el.dataset.delPart);await loadData();render();
  }));
  document.querySelectorAll('[data-approve]').forEach(el=>el.addEventListener('click',async()=>{
    await sb.from('videos').update({status:'approved'}).eq('id',+el.dataset.approve);await loadData();render();
  }));
  document.querySelectorAll('[data-reject]').forEach(el=>el.addEventListener('click',async()=>{
    await sb.from('videos').update({status:'rejected'}).eq('id',+el.dataset.reject);await loadData();render();
  }));
  document.querySelectorAll('[data-save-role]').forEach(el=>el.addEventListener('click',async()=>{
    const uid=el.dataset.saveRole;
    const sel=document.querySelector(`[data-role-uid="${uid}"]`);
    if(sel){await sb.from('profiles').update({role:sel.value}).eq('id',uid);await loadData();render();}
  }));
  document.getElementById('mod-bg')?.addEventListener('click',e=>{if(e.target.id==='mod-bg'){S.modal=null;render();}});
  document.getElementById('mod-cancel')?.addEventListener('click',()=>{S.modal=null;render();});
  document.getElementById('mod-ok')?.addEventListener('click',async()=>{
    const m=S.modal;S.error='';
    if(m.type==='part'){
      const from=document.getElementById('m-from').value;
      const to=document.getElementById('m-to').value;
      const note=(document.getElementById('m-note').value||'').trim();
      const player_id=document.getElementById('m-player').value||null;
      if(from===''||to===''){S.error='Remplis les % de début et fin.';render();return;}
      if(m.edit){await sb.from('parts').update({from_pct:+from,to_pct:+to,note,player_id}).eq('id',m.edit);}
      else{await sb.from('parts').insert({from_pct:+from,to_pct:+to,note,player_id,level_id:S.level.id});}
      S.modal=null;await loadData();render();
    } else if(m.type==='video'){
      const url=(document.getElementById('m-url').value||'').trim();
      const hardest=(document.getElementById('m-hardest').value||'').trim();
      if(!url){S.error='Entre un lien.';render();return;}
      const existing=videoFor(m.part_id);
      if(existing){await sb.from('videos').update({url,hardest,status:'pending'}).eq('id',existing.id);}
      else{await sb.from('videos').insert({part_id:m.part_id,player_id:S.profile.id,url,hardest,status:'pending'});}
      S.modal=null;await loadData();render();
    }
  });
}

init();
</script>
